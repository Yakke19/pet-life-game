<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetLife Deluxe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            /* Красивый игровой фон */
            background: url('https://img.freepik.com/free-vector/cozy-living-room-interior-design_1262-15462.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-screen {
            width: 90%;
            max-width: 400px;
            height: 80vh;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px); /* Эффект матового стекла */
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
            color: #fff;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
        }

        .pet-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .pet-avatar {
            font-size: 120px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            transition: 0.3s;
        }

        .stats-panel {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 25px;
            margin-bottom: 20px;
        }

        .progress-container { margin: 10px 0; }
        .progress-label { font-size: 12px; margin-bottom: 5px; display: block; }
        .progress-bg { background: rgba(255,255,255,0.2); height: 12px; border-radius: 6px; overflow: hidden; }
        .progress-fill { height: 100%; transition: 0.5s; }

        .action-bar {
            display: flex;
            justify-content: space-around;
            padding-bottom: 10px;
        }

        .round-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: #fff;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: 0.2s;
        }

        .round-btn:active { transform: scale(0.9); }
        
        .pet-selector {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .mini-pet {
            background: rgba(255,255,255,0.3);
            padding: 5px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="game-screen">
    <div class="top-bar">
        <span>⭐ Уровень <span id="lvl">1</span></span>
        <span style="color: #ffd700;">💰 <span id="coins">20</span></span>
    </div>

    <div class="pet-container">
        <div id="main-pet" class="pet-avatar">🐱</div>
        <div class="pet-selector">
            <div class="mini-pet" onclick="changePet('🐱')">🐱</div>
            <div class="mini-pet" onclick="changePet('🐶')">🐶</div>
            <div class="mini-pet" onclick="changePet('🐰')">🐰</div>
            <div class="mini-pet" onclick="changePet('🐹')">🐹</div>
        </div>
    </div>

    <div class="stats-panel">
        <div class="progress-container">
            <span class="progress-label">🍎 Сытость</span>
            <div class="progress-bg"><div id="bar-h" class="progress-fill" style="width: 70%; background: #4caf50;"></div></div>
        </div>
        <div class="progress-container">
            <span class="progress-label">🎾 Счастье</span>
            <div class="progress-bg"><div id="bar-s" class="progress-fill" style="width: 50%; background: #2196f3;"></div></div>
        </div>
    </div>

    <div class="action-bar">
        <button class="round-btn" onclick="act('feed')">🍲</button>
        <button class="round-btn" onclick="act('play')">🏀</button>
        <button class="round-btn" onclick="act('clean')">🧼</button>
        <button class="round-btn" onclick="act('sleep')">💤</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let data = JSON.parse(localStorage.getItem('pet_deluxe')) || { h: 70, s: 50, c: 20, l: 1, type: '🐱' };

    function changePet(type) {
        data.type = type;
        update();
    }

    function update() {
        document.getElementById('main-pet').innerText = data.type;
        document.getElementById('bar-h').style.width = data.h + '%';
        document.getElementById('bar-s').style.width = data.s + '%';
        document.getElementById('coins').innerText = data.coins;
        document.getElementById('lvl').innerText = data.l;
        localStorage.setItem('pet_deluxe', JSON.stringify(data));
    }

    function act(type) {
        if(type === 'feed' && data.c >= 5) { data.c -= 5; data.h = Math.min(100, data.h + 20); }
        if(type === 'play') { data.s = Math.min(100, data.s + 15); data.c += 10; }
        tg.HapticFeedback.impactOccurred('medium');
        update();
    }

    update();
</script>

</body>
</html>
