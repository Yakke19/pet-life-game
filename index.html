<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetLife Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(180deg, #a1c4fd 0%, #c2e9fb 100%); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .game-card { background: rgba(255, 255, 255, 0.9); border-radius: 30px; padding: 25px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .pet-emoji { font-size: 100px; transition: transform 0.2s; cursor: pointer; }
        .pet-emoji:active { transform: scale(1.2) rotate(5deg); }
        .stat-row { margin: 15px 0; text-align: left; }
        .label { font-weight: bold; font-size: 14px; margin-bottom: 5px; display: block; }
        .bar-bg { background: #ddd; border-radius: 10px; height: 12px; width: 100%; position: relative; }
        .bar-fill { height: 100%; border-radius: 10px; transition: width 0.5s; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { border: none; padding: 12px; border-radius: 15px; color: white; font-weight: bold; font-size: 14px; cursor: pointer; transition: filter 0.2s; }
        .btn-feed { background: #4caf50; }
        .btn-play { background: #ff9800; }
        .btn-sleep { background: #2196f3; }
        button:active { filter: brightness(0.8); }
    </style>
</head>
<body>
    <div class="game-card">
        <div class="pet-emoji" id="pet" onclick="bounce()">🐱</div>
        <h2 style="margin: 10px 0;">Рыжик</h2>
        
        <div class="stat-row">
            <span class="label">🥩 Сытость: <span id="val-hunger">80</span>%</span>
            <div class="bar-bg"><div id="bar-hunger" class="bar-fill" style="width: 80%; background: #4caf50;"></div></div>
        </div>
        <div class="stat-row">
            <span class="label">⚡ Энергия: <span id="val-energy">60</span>%</span>
            <div class="bar-bg"><div id="bar-energy" class="bar-fill" style="width: 60%; background: #2196f3;"></div></div>
        </div>

        <div class="btn-grid">
            <button class="btn-feed" onclick="action('hunger', 15)">Кормить 🍎</button>
            <button class="btn-play" onclick="action('energy', -10); bounce()">Играть 🎾</button>
            <button class="btn-sleep" onclick="action('energy', 30)">Спать 💤</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let stats = { hunger: 80, energy: 60 };

        function action(type, value) {
            stats[type] = Math.min(100, Math.max(0, stats[type] + value));
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        }

        function updateUI() {
            document.getElementById('val-hunger').innerText = stats.hunger;
            document.getElementById('bar-hunger').style.width = stats.hunger + '%';
            document.getElementById('val-energy').innerText = stats.energy;
            document.getElementById('bar-energy').style.width = stats.energy + '%';
            
            // Если питомец голоден, меняем эмодзи
            const pet = document.getElementById('pet');
            if (stats.hunger < 30) pet.innerText = "😿";
            else if (stats.energy < 20) pet.innerText = "😴";
            else pet.innerText = "🐱";
        }

        function bounce() {
            const pet = document.getElementById('pet');
            pet.style.transform = "scale(1.2)";
            setTimeout(() => pet.style.transform = "scale(1)", 200);
        }
    </script>
</body>
</html>
