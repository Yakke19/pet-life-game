<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Clicker RPG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: #1a1a2e; /* Темный фэнтезийный фон */
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .game-window {
            width: 90%;
            max-width: 380px;
            height: 85vh;
            background: linear-gradient(145deg, #161623, #1f1f3a);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 2px solid #e94560;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        .top-status {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .dungeon-zone {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .monster {
            font-size: 110px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s ease;
            filter: drop-shadow(0 10px 20px rgba(233, 69, 96, 0.3));
        }

        .monster:active {
            transform: scale(0.9) rotate(5deg);
        }

        .hp-container {
            width: 80%;
            margin-top: 15px;
            text-align: center;
        }

        .hp-bar-bg {
            background: #444;
            height: 14px;
            border-radius: 7px;
            overflow: hidden;
            border: 1px solid #000;
            margin-top: 5px;
        }

        .hp-bar-fill {
            height: 100%;
            background: #e94560;
            width: 100%;
            transition: width 0.1s ease;
        }

        .shop-zone {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .weapon-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .upgrade-btn {
            background: #0f969c;
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #07686c;
            transition: 0.1s;
        }

        .upgrade-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        .damage-text {
            position: absolute;
            color: #ff4a4a;
            font-weight: bold;
            font-size: 24px;
            animation: floatUp 0.6s ease-out forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-60px); }
        }
    </style>
</head>
<body>

    <div class="game-window">
        <div class="top-status">
            <span style="color: #e94560;">🏰 Этаж: <span id="stage">1</span></span>
            <span style="color: #ffd700;">💰 Золото: <span id="gold">0</span></span>
        </div>

        <div class="dungeon-zone">
            <div id="monster-name" style="font-size: 16px; font-weight: bold; color: #aaa; margin-bottom: 5px;">Гоблин</div>
            <div id="monster" class="monster" onclick="dealDamage(event)">👹</div>
            
            <div class="hp-container">
                <span style="font-size: 12px; font-weight: bold;">HP: <span id="hp-text">50/50</span></span>
                <div class="hp-bar-bg"><div id="hp-bar" class="hp-bar-fill"></div></div>
            </div>
        </div>

        <div class="shop-zone">
            <div class="weapon-info">
                <div>
                    <div style="font-weight: bold;" id="weapon-name">⚔️ Ржавый меч (Лвл 1)</div>
                    <div style="color: #0f969c; font-size: 12px;">Урон за клик: +<span id="dmg-val">1</span></div>
                </div>
                <button class="upgrade-btn" onclick="upgradeWeapon()">Апгрейд (<span id="cost-val">15</span>💰)</button>
            </div>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Список монстров и боссов
    const monsters = ["👹 Гоблин", "💀 Скелет", "🧛 Вампир", "🐺 Оборотень"];
    const bosses = ["🐉 Древний Дракон", "👑 Повелитель Тьмы", "👿 Демон Бездны"];

    // Базовые параметры
    let save = JSON.parse(localStorage.getItem('dungeon_save')) || {
        gold: 0,
        stage: 1,
        weaponLvl: 1,
        dmg: 1,
        upgradeCost: 15
    };

    let maxHp = 0;
    let currentHp = 0;
    let isBoss = false;

    function initMonster() {
        // Каждый 5-й уровень — Босс
        if (save.stage % 5 === 0) {
            isBoss = true;
            maxHp = save.stage * 40;
            const randomBoss = bosses[Math.floor(Math.random() * bosses.length)];
            document.getElementById('monster-name').innerText = "🔥 БОСС: " + randomBoss.split(' ')[1];
            document.getElementById('monster').innerText = randomBoss.split(' ')[0];
            document.getElementById('hp-bar').style.background = "#ffcc00"; // Желтая шкала для босса
        } else {
            isBoss = false;
            maxHp = save.stage * 15 + 20;
            const randomMonster = monsters[Math.floor(Math.random() * monsters.length)];
            document.getElementById('monster-name').innerText = randomMonster.split(' ')[1];
            document.getElementById('monster').innerText = randomMonster.split(' ')[0];
            document.getElementById('hp-bar').style.background = "#e94560";
        }
        currentHp = maxHp;
        updateUI();
    }

    function updateUI() {
        document.getElementById('stage').innerText = save.stage;
        document.getElementById('gold').innerText = save.gold;
        document.getElementById('hp-text').innerText = `${currentHp}/${maxHp}`;
        
        let pct = (currentHp / maxHp) * 100;
        document.getElementById('hp-bar').style.width = pct + '%';

        // Обновление магазина
        document.getElementById('weapon-name').innerText = `⚔️ Стальной меч (Лвл ${save.weaponLvl})`;
        document.getElementById('dmg-val').innerText = save.dmg;
        document.getElementById('cost-val').innerText = save.upgradeCost;

        localStorage.setItem('dungeon_save', JSON.stringify(save));
    }

    function dealDamage(event) {
        currentHp -= save.dmg;
        save.gold += isBoss ? save.stage * 3 : 1; // За босса золота больше
        
        // Визуальный эффект урона (вылетающие цифры)
        createDamageText(event.clientX, event.clientY, `-${save.dmg}`);
        
        tg.HapticFeedback.impactOccurred('light');

        if (currentHp <= 0) {
            save.stage++;
            save.gold += save.stage * 5; // Бонус за прохождение уровня
            tg.HapticFeedback.notificationOccurred('success');
            initMonster();
        } else {
            updateUI();
        }
    }

    function createDamageText(x, y, text) {
        const txt = document.createElement('div');
        txt.className = 'damage-text';
        txt.innerText = text;
        txt.style.left = (x - 15) + 'px';
        txt.style.top = (y - 30) + 'px';
        document.body.appendChild(txt);
        setTimeout(() => txt.remove(), 600);
    }

    function upgradeWeapon() {
        if (save.gold >= save.upgradeCost) {
            save.gold -= save.upgradeCost;
            save.weaponLvl++;
            save.dmg += 2;
            save.upgradeCost = Math.round(save.upgradeCost * 1.6);
            tg.HapticFeedback.notificationOccurred('success');
            updateUI();
        }
    }

    // Старт игры
    initMonster();
</script>
