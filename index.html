<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetLife Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .pet-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 80%;
            max-width: 300px;
        }
        .pet-image {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .stats {
            width: 100%;
            background: #eee;
            border-radius: 10px;
            height: 20px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress {
            background: #4caf50;
            height: 100%;
            width: 50%; /* Начальное значение сытости */
            transition: width 0.3s;
        }
        button {
            background: #0088cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="pet-container">
        <div class="pet-image">🐱</div>
        <h2>Рыжик</h2>
        <p>Сытость: <span id="hunger-val">50</span>%</p>
        <div class="stats">
            <div id="progress-bar" class="progress"></div>
        </div>
        <button onclick="feed()">Покормить 🍎</button>
    </div>

    <script>
        let hunger = 50;
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть окно на весь экран

        function feed() {
            if (hunger < 100) {
                hunger += 10;
                if (hunger > 100) hunger = 100;
                document.getElementById('hunger-val').innerText = hunger;
                document.getElementById('progress-bar').style.width = hunger + '%';

                // Вибрация телефона (как в настоящих играх!)
                tg.HapticFeedback.impactOccurred('medium');
            }
        }
    </script>
</body>
</html>
