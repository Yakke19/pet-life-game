<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Card Battler</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #11131e; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .window { width: 92%; max-width: 380px; height: 90vh; background: #1a1c28; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); border: 2px solid #5a4fcf; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; justify-content: space-between; }
        .hud { display: flex; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 8px 12px; border-radius: 12px; font-size: 14px; font-weight: bold; }
        .arena { display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; }
        .monster-box { text-align: center; margin-bottom: 20px; position: relative; }
        .monster-avatar { font-size: 90px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); transition: transform 0.2s; }
        .intent { background: rgba(255, 0, 0, 0.2); padding: 3px 8px; border-radius: 8px; font-size: 12px; border: 1px solid rgba(255,0,0,0.3); display: inline-block; margin-bottom: 5px; }
        .bar { width: 160px; background: #333; height: 10px; border-radius: 5px; overflow: hidden; border: 1px solid #000; margin: 3px auto; }
        .fill { height: 100%; transition: width 0.3s; }
        .player-box { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 20px; width: 100%; box-sizing: border-box; text-align: center; }
        .energy-dots { font-size: 18px; color: #00d2ff; margin-bottom: 8px; font-weight: bold; }
        .hand { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .card { background: linear-gradient(135deg, #2e314d, #1c1e36); border: 2px solid #5a4fcf; border-radius: 12px; padding: 10px 5px; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.3); transition: transform 0.1s, border-color 0.2s; }
        .card:active { transform: scale(0.95); }
        .card.disabled { opacity: 0.4; border-color: #333; cursor: not-allowed; }
        .card-cost { background: #00d2ff; color: #000; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-bottom: 5px; }
        .log { font-size: 12px; color: #aaa; min-height: 18px; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="window">
    <div class="hud">
        <span style="color: #5a4fcf;">🏰 ЭТАЖ: <span id="stage">1</span></span>
        <span style="color: #ffd700;">💰 ЗОЛОТО: <span id="gold">0</span></span>
    </div>

    <div class="arena">
        <div class="monster-box">
            <div id="m-intent" class="intent">⚔️ Готовит удар: 6 пао</div>
            <div id="m-avatar" class="monster-avatar">💀</div>
            <div id="m-name" style="font-weight: bold; font-size: 15px;">Скелет</div>
            <div class="bar"><div id="m-hp-bar" class="fill" style="background: #ff4a4a; width: 100%;"></div></div>
            <div style="font-size: 11px;" id="m-hp-text">20/20 HP</div>
        </div>

        <div class="player-box">
            <div style="font-weight: bold; font-size: 14px; margin-bottom: 2px;">Ты (Рыцарь)</div>
            <div class="bar" style="width: 200px;"><div id="p-hp-bar" class="fill" style="background: #4caf50; width: 100%;"></div></div>
            <div style="font-size: 11px; margin-bottom: 5px;" id="p-hp-text">50/50 HP <span id="p-block-text" style="color:#00d2ff"></span></div>
            
            <div id="energy-display" class="energy-dots">⚡ Энергия: 3/3</div>
            
            <div class="hand">
                <div class="card" onclick="playCard('attack')">
                    <div class="card-cost">1</div>
                    <div style="font-size: 18px;">⚔️</div>
                    <div style="font-size: 11px; font-weight: bold;">Удар</div>
                    <div style="font-size: 9px; color: #ccc;">+7 Урона</div>
                </div>
                <div class="card" onclick="playCard('block')">
                    <div class="card-cost">1</div>
                    <div style="font-size: 18px;">🛡️</div>
                    <div style="font-size: 11px; font-weight: bold;">Блок</div>
                    <div style="font-size: 9px; color: #ccc;">+6 Защиты</div>
                </div>
                <div class="card" onclick="playCard('heal')">
                    <div class="card-cost">2</div>
                    <div style="font-size: 18px;">🧪</div>
                    <div style="font-size: 11px; font-weight: bold;">Лечение</div>
                    <div style="font-size: 9px; color: #ccc;">+10 HP</div>
                </div>
            </div>
            <button onclick="endTurn()" style="margin-top: 10px; width: 100%; background: #5a4fcf; border: none; color: white; padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer;">Конец хода ➡️</button>
        </div>
    </div>
    <div id="combat-log" class="log">Твой ход! Выбирай карты.</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const mTypes = [
        { name: "Гоблин 👺", hp: 25, dmg: 5, emoji: "👺" },
        { name: "Скелет 💀", hp: 35, dmg: 7, emoji: "💀" },
        { name: "Оборотень 🐺", hp: 45, dmg: 9, emoji: "🐺" },
        { name: "БОСС: Дракон 🐉", hp: 80, dmg: 14, emoji: "🐉" }
    ];

    let state = JSON.parse(localStorage.getItem('dungeon_turn_save')) || { stage: 1, gold: 0 };
    let pHp = 50, pMaxHp = 50, pBlock = 0, pEnergy = 3;
    let mHp = 20, mMaxHp = 20, mDmg = 5, mIntent = 'attack'; // attack или defend

    function initFloor() {
        pEnergy = 3;
        pBlock = 0;
        let info = mTypes[Math.min(mTypes.length - 1, Math.floor((state.stage - 1) / 2))];
        if (state.stage % 5 === 0) info = mTypes[3]; // Каждые 5 этажей — дракон
        
        mMaxHp = info.hp + (state.stage * 3);
        mHp = mMaxHp;
        mDmg = info.dmg + Math.floor(state.stage * 0.8);
        
        document.getElementById('m-name').innerText = info.name;
        document.getElementById('m-avatar').innerText = info.emoji;
        
        rollMonsterIntent();
        updateUI();
    }

    function rollMonsterIntent() {
        mIntent = Math.random() > 0.4 ? 'attack' : 'defend';
        const intentTxt = document.getElementById('m-intent');
        if(mIntent === 'attack') {
            intentTxt.innerText = `⚔️ Намерен атаковать на: ${mDmg} урона`;
            intentTxt.style.background = "rgba(255,0,0,0.2)";
        } else {
            intentTxt.innerText = `🛡️ Собирается защищаться`;
            intentTxt.style.background = "rgba(0,180,255,0.2)";
        }
    }

    function updateUI() {
        // Игрок
        document.getElementById('p-hp-text').innerHTML = `${pHp}/${pMaxHp} HP ${pBlock > 0 ? `<span style='color:#00d2ff'>[+${pBlock} 🛡️]</span>` : ''}`;
        document.getElementById('p-hp-bar').style.width = (pHp / pMaxHp) * 100 + '%';
        document.getElementById('energy-display').innerText = `⚡ Энергия: ${pEnergy}/3`;
        
        // Враг
        document.getElementById('m-hp-text').innerText = `${mHp}/${mMaxHp} HP`;
        document.getElementById('m-hp-bar').style.width = (mHp / mMaxHp) * 100 + '%';
        
        // Общие данные
        document.getElementById('stage').innerText = state.stage;
        document.getElementById('gold').innerText = state.gold;
        
        localStorage.setItem('dungeon_turn_save', JSON.stringify(state));
    }

    function playCard(type) {
        if (type === 'attack' && pEnergy >= 1) {
            pEnergy -= 1;
            let dmg = 7;
            mHp = Math.max(0, mHp - dmg);
            log(`Ты нанес ${dmg} урона врагу!`);
            tg.HapticFeedback.impactOccurred('light');
        } else if (type === 'block' && pEnergy >= 1) {
            pEnergy -= 1;
            pBlock += 6;
            log(`Ты выставил щит на +6 защиты!`);
            tg.HapticFeedback.impactOccurred('light');
        } else if (type === 'heal' && pEnergy >= 2) {
            pEnergy -= 2;
            pHp = Math.min(pMaxHp, pHp + 10);
            log(`Ты восстановил 10 HP!`);
            tg.HapticFeedback.notificationOccurred('success');
        } else {
            return; // Нет энергии
        }

        if (mHp <= 0) {
            state.stage++;
            state.gold += state.stage * 6;
            log(`Победа! Вы переходите на этаж ${state.stage}`);
            tg.HapticFeedback.notificationOccurred('success');
            setTimeout(initFloor, 1200);
        } else {
            updateUI();
        }
    }

    function endTurn() {
        // Ход монстра
        if (mHp <= 0) return;
        
        document.getElementById('m-avatar').style.transform = "scale(1.2)";
        setTimeout(() => document.getElementById('m-avatar').style.transform = "scale(1)", 200);

        if (mIntent === 'attack') {
            let finalDmg = Math.max(0, mDmg - pBlock);
            pHp = Math.max(0, pHp - finalDmg);
            log(`Монстр бьет на ${mDmg}. Твой блок поглотил урон. Ты получил ${finalDmg} урона!`);
        } else {
            mHp = Math.min(mMaxHp, mHp + 5);
            log(`Монстр ушел в защиту и восстановил 5 HP!`);
        }

        pBlock = 0; // Блок сгорает в конце раунда
        pEnergy = 3; // Энергия восстанавливается

        if (pHp <= 0) {
            log(`Ты погиб! Отступление на 1 этаж назад.`);
            state.stage = Math.max(1, state.stage - 1);
            pHp = pMaxHp;
            setTimeout(initFloor, 1500);
        } else {
            rollMonsterIntent();
            updateUI();
        }
    }

    function log(msg) {
        document.getElementById('combat-log').innerText = msg;
    }

    initFloor();
</script>

</body>
</html>
